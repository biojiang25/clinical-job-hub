<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>岗位直达清单 | 研职图谱</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-badge">研</span>
        <span>研职图谱</span>
      </a>
      <nav class="site-nav">
        <a href="./index.html">首页</a>
        <a href="./channels.html">高频渠道雷达</a>
      </nav>
    </header>

    <main class="jobs-main-simple">
      <section class="panel" aria-labelledby="list-title">
        <div class="list-head">
          <h1 id="list-title">岗位直达清单</h1>
          <span id="list-count" class="count-pill">0 条</span>
        </div>

        <div class="sync-bar">
          <button id="sync-jobs-btn" class="btn btn-secondary" type="button">同步最新岗位</button>
          <span id="sync-status" class="sync-status">仅展示可直达报名页面的链接</span>
        </div>

        <div class="filters">
          <label>
            关键词
            <input id="filter-keyword" type="text" placeholder="岗位名/单位/城市" />
          </label>

          <label>
            学科方向
            <select id="filter-discipline">
              <option value="全部">全部</option>
              <option value="临床检验诊断学">临床检验诊断学</option>
              <option value="药学">药学</option>
              <option value="生物学">生物学</option>
            </select>
          </label>

          <label>
            学历要求
            <select id="filter-degree">
              <option value="全部">全部</option>
              <option value="本科">本科</option>
              <option value="硕士">硕士</option>
              <option value="本硕不限">本硕不限</option>
            </select>
          </label>
        </div>

        <div id="job-list" class="job-list"></div>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
